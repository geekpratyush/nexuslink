# NexusLink local test environment — all open-source services, one per protocol module.
#
# Licensing note: this file only *references* upstream images to run them as local test
# fixtures. It does not redistribute them, and NexusLink links to each service only through
# its permissively licensed client library (Apache/MIT/BSD JDBC & SDK drivers), never the
# server. So none of these images' licenses (incl. SSPL/AGPL) attach to the NexusLink code.
#
# Usage:
#   docker compose -f test-env/docker-compose.yml up -d          # core + heavy services
#   docker compose -f test-env/docker-compose.yml --profile extra up -d   # + schema registry
#   docker compose -f test-env/docker-compose.yml down -v        # stop + wipe volumes
#
# Every credential here is a throwaway local test value (nexus/nexus, admin/admin, etc.).

name: nexuslink-test

services:

  # ---- PHASE 8: Databases (JDBC) ----
  postgres:                                   # PostgreSQL License (permissive)
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
      POSTGRES_DB: nexus
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 20

  mariadb:                                    # GPLv2 (fully open; MySQL-compatible)
    image: mariadb:11
    environment:
      MARIADB_ROOT_PASSWORD: nexus
      MARIADB_DATABASE: nexus
      MARIADB_USER: nexus
      MARIADB_PASSWORD: nexus
    ports: ["3306:3306"]
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- PHASE 8: MongoDB ----
  mongo:                                       # SSPL (run-only test fixture; driver is Apache-2.0)
    image: mongo:7
    ports: ["27017:27017"]
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ping:1}).ok"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- PHASE 8: Redis ----
  redis:                                       # BSD-3-Clause
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  # ---- PHASE 4: Kafka (KRaft, no ZooKeeper) ----
  kafka:                                       # Apache-2.0
    image: apache/kafka:3.9.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  # ---- PHASE 4 (extra): Confluent-compatible Schema Registry via Apicurio (Apache-2.0) ----
  schema-registry:
    image: apicurio/apicurio-registry-mem:2.6.2.Final
    profiles: ["extra"]
    ports: ["8081:8080"]
    environment:
      QUARKUS_HTTP_CORS_ORIGINS: "*"
    # Confluent-compatible API base: http://localhost:8081/apis/ccompat/v7

  # ---- PHASE 5: RabbitMQ ----
  rabbitmq:                                    # MPL-2.0
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: nexus
      RABBITMQ_DEFAULT_PASS: nexus
    ports: ["5672:5672", "15672:15672"]        # AMQP + management UI/API
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 20

  # ---- PHASE 5: JMS (ActiveMQ Artemis) ----
  artemis:                                     # Apache-2.0
    image: apache/activemq-artemis:2.31.2
    environment:
      ARTEMIS_USER: nexus
      ARTEMIS_PASSWORD: nexus123
    ports: ["61616:61616", "8161:8161"]        # core/JMS wire + management console
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8161 >/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  # ---- PHASE 5: MQTT ----
  mosquitto:                                   # EPL-2.0 / EDL-1.0
    image: eclipse-mosquitto:2
    ports: ["1883:1883", "9001:9001"]          # MQTT + MQTT-over-WebSocket
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 -h localhost || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ---- PHASE 8: LDAP / Active-Directory-style directory ----
  openldap:                                    # image wrapper open; slapd is OpenLDAP Public License
    image: osixia/openldap:1.5.0
    command: ["--copy-service"]
    environment:
      LDAP_ORGANISATION: "NexusLink Dev"
      LDAP_DOMAIN: "nexuslink.dev"             # base DN: dc=nexuslink,dc=dev
      LDAP_ADMIN_PASSWORD: "admin"             # bind: cn=admin,dc=nexuslink,dc=dev
    ports: ["389:389", "636:636"]
    volumes:
      - ./ldap/seed.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/50-seed.ldif:ro

  # ---- PHASE 8: SNMP agent (net-snmp) ----
  snmpd:                                        # net-snmp, BSD-style
    image: polinux/snmpd:alpine
    ports: ["1161:161/udp"]                     # community "public" (v1/v2c)

  # ---- PHASE 7: SFTP ----
  sftp:                                         # atmoz/sftp, MIT
    image: atmoz/sftp:alpine
    command: "nexus:nexus:1001::upload"         # user nexus / pw nexus, writable /upload
    ports: ["2222:22"]

  # ---- PHASE 7: FTP / FTPS ----
  ftp:                                          # delfer/alpine-ftp-server, MIT (vsftpd)
    image: delfer/alpine-ftp-server:latest
    environment:
      USERS: "nexus|nexus123"
      ADDRESS: localhost
      MIN_PORT: "21000"
      MAX_PORT: "21010"
    ports: ["21:21", "21000-21010:21000-21010"]

  # ---- PHASE 8: S3 (+ future SQS/SNS) via LocalStack ----
  localstack:                                   # Apache-2.0 (community edition)
    image: localstack/localstack:3
    environment:
      SERVICES: "s3,sqs,sns,secretsmanager"
      DEBUG: "0"
    ports: ["4566:4566"]                        # S3 endpoint: http://localhost:4566 (path-style)
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  # ---- PHASE 9: HashiCorp Vault (dev mode) ----
  vault:                                        # BUSL-1.1 image, run-only test fixture; our client is plain HTTP
    image: hashicorp/vault:1.15
    cap_add: ["IPC_LOCK"]
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: "root"           # dev-mode root token
      VAULT_DEV_LISTEN_ADDRESS: "0.0.0.0:8200"
    command: "server -dev"
    ports: ["8200:8200"]                         # API: http://localhost:8200, KV v2 mount at secret/
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8200/v1/sys/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  # ---- PHASE 9: CyberArk Conjur OSS (machine-identity secret store) ----
  conjur-db:                                    # PostgreSQL License (permissive) — Conjur's backing store
    image: postgres:15
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    profiles: ["conjur"]

  conjur:                                       # LGPL-3.0 (OSS); run-only fixture, our client is plain HTTP
    image: cyberark/conjur
    command: server
    environment:
      DATABASE_URL: postgres://postgres@conjur-db/postgres
      CONJUR_DATA_KEY: "bJe7B7Rq4C/QTSylEd/0HZ5yGTi8s5Tw64LPVmrPC4k="   # throwaway local test key
      CONJUR_AUTHENTICATORS: authn
    depends_on: ["conjur-db"]
    ports: ["8083:80"]                          # API: http://localhost:8083
    profiles: ["conjur"]                        # opt-in (needs conjurctl provisioning — see test-env/conjur/setup.sh)

  # ---- PHASE 8: Azure Blob (emulator) ----
  azurite:                                      # MIT
    image: mcr.microsoft.com/azure-storage/azurite
    command: "azurite --blobHost 0.0.0.0 --queueHost 0.0.0.0 --tableHost 0.0.0.0"
    ports: ["10000:10000", "10001:10001", "10002:10002"]

  # ---- PHASE 8: Google Cloud Storage (emulator) ----
  fake-gcs:                                     # fsouza/fake-gcs-server, BSD-2-Clause
    image: fsouza/fake-gcs-server:latest
    command: "-scheme http -port 4443 -external-url http://localhost:4443"
    ports: ["4443:4443"]

  pubsub:                                        # Google Cloud Pub/Sub emulator (Apache-2.0 SDK image)
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command: "gcloud beta emulators pubsub start --host-port=0.0.0.0:8085 --project=nexus-it"
    ports: ["8085:8085"]                         # PUBSUB_EMULATOR_HOST=localhost:8085

  # ---- PHASE 3: HTTP (REST) target ----
  httpbin:                                       # mccutchen/go-httpbin, MIT
    image: mccutchen/go-httpbin:latest
    ports: ["8088:8080"]                         # http://localhost:8088 (get/post/status/basic-auth/…)
